<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Student Dashboard</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;color:#1f2937}
.hdr{background:linear-gradient(135deg,#1e3c72,#2a5298);color:#fff;padding:16px 28px;display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:20px;font-weight:700}
a.logout{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);padding:7px 16px;border-radius:7px;font-size:13px;text-decoration:none}
.main{padding:24px;max-width:500px;margin:0 auto;display:flex;flex-direction:column;gap:18px}
.card{background:#fff;border-radius:14px;padding:22px;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.card h3{font-size:15px;font-weight:700;color:#1e3c72;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.btns{display:flex;gap:10px}
.btn{padding:11px 22px;border:none;border-radius:8px;font-size:14px;font-weight:700;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px}
.btn:hover{transform:translateY(-1px)}
.btn-scan{background:#16a34a;color:#fff}.btn-stop{background:#dc2626;color:#fff}
#reader{width:100%;min-height:260px;background:#0f172a;border-radius:12px;overflow:hidden;border:2px dashed #374151;position:relative}
.cam-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:rgba(255,255,255,.3);pointer-events:none}
.cam-placeholder svg{width:48px;height:48px;opacity:.3}
.feedback{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:10px;font-size:14px;font-weight:600;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fb-ok{background:#dcfce7;color:#15803d;border:1px solid #bbf7d0}
.fb-err{background:#fee2e2;color:#b91c1c;border:1px solid #fecaca}
</style>
</head>
<body>
<div class="hdr">
  <h1>🎓 Student Dashboard</h1>
  <a href="/logout" class="logout">Logout</a>
</div>

<div class="main">
  <div class="card">
    <h3>📷 Scan QR Code</h3>
    <div style="position:relative;margin-bottom:14px">
      <div id="reader">
        <div class="cam-placeholder" id="placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2M7 12h10M12 7v10"/></svg>
          <p>Camera off — press Start Camera</p>
        </div>
      </div>
    </div>
    <div id="feedback"></div>
    <div class="btns" style="margin-top:12px">
      <button class="btn btn-scan" id="startBtn" onclick="startScan()">📷 Start Camera</button>
      <button class="btn btn-stop" id="stopBtn"  onclick="stopScan()" style="display:none">⏹ Stop</button>
    </div>
    <p style="font-size:12px;color:#9ca3af;margin-top:10px;text-align:center">Point camera at the QR code displayed by your teacher</p>
  </div>
</div>

<script>
let qr, scanning=false;

function startScan(){
  document.getElementById('placeholder').style.display='none';
  document.getElementById('feedback').innerHTML='';
  qr=new Html5Qrcode('reader');
  qr.start({facingMode:'environment'},{fps:10,qrbox:{width:220,height:220}},onScan,()=>{})
  .then(()=>{ scanning=true; document.getElementById('startBtn').style.display='none'; document.getElementById('stopBtn').style.display='flex'; })
  .catch(e=>showFeedback('Camera error: '+e.message,false));
}

function stopScan(){
  if(qr&&scanning){ qr.stop().then(()=>{ scanning=false; document.getElementById('startBtn').style.display='flex'; document.getElementById('stopBtn').style.display='none'; document.getElementById('placeholder').style.display='flex'; }); }
}

function onScan(text){
  stopScan();
  let data;
  try{ data=JSON.parse(text); }catch(e){ showFeedback('Invalid QR format',false); return; }
  fetch('/mark-attendance',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:data.session_id,token:data.token})})
  .then(r=>r.json()).then(d=>{
    const ok=!!d.message;
    showFeedback(d.message||d.error,ok);
    if(!ok&&!(d.error||'').includes('Already')){ setTimeout(startScan,2500); }
  }).catch(()=>showFeedback('Network error',false));
}

function showFeedback(msg,ok){
  const div=document.getElementById('feedback');
  div.innerHTML=`<div class="feedback ${ok?'fb-ok':'fb-err'}">${ok?'✅':'❌'} ${msg}</div>`;
  if(ok){ setTimeout(()=>{ div.innerHTML=''; },4000); }
}
</script>
</body>
</html>
