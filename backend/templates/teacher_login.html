<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Teacher Login – Smart Attend</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#1e3c72,#2a5298);
     display:flex;justify-content:center;align-items:center;min-height:100vh}
.card{background:#fff;padding:40px;width:360px;border-radius:16px;box-shadow:0 20px 50px rgba(0,0,0,.3);animation:up .6s ease}
@keyframes up{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
h2{font-size:22px;font-weight:700;color:#1e3c72;text-align:center;margin-bottom:24px}
label{display:block;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#6b7280;margin-bottom:4px}
input{width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;
      outline:none;transition:.2s;margin-bottom:14px}
input:focus{border-color:#2a5298;box-shadow:0 0 0 3px rgba(42,82,152,.12)}
button{width:100%;padding:12px;border:none;border-radius:8px;background:linear-gradient(135deg,#1e3c72,#2a5298);
       color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:.2s;margin-top:4px}
button:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(30,60,114,.35)}
.error{background:#fef2f2;border:1px solid #fecaca;color:#b91c1c;border-radius:8px;
       padding:10px 14px;font-size:13px;margin-bottom:14px}
.switch{display:block;text-align:center;margin-top:16px;color:#2a5298;font-size:13px;text-decoration:none}
.switch:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="card">
  <h2>👨‍🏫 Teacher Login</h2>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <label>Email</label>
    <input type="email" name="email" placeholder="teacher@college.com" required autofocus>
    <label>Password</label>
    <input type="password" name="password" placeholder="••••••••" required>
    <button type="submit">Sign In</button>
  </form>
  <a class="switch" href="/student-login">→ Switch to Student Login</a>
</div>
</body>
</html>
